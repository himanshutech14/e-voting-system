{% extends "base.html" %}
{% block content %}
<div class="form-card mx-auto">
    <div class="do-card-head">Election Results</div>
    <div class="do-card-body bg-white text-dark">
        <table class="table table-bordered align-middle">
            <tr><th>Logo</th><th>Candidate</th><th>Votes</th></tr>
            {% for c in candidates %}
            <tr>
                <td><img class="result-logo" src="{{ url_for('static', filename='images/' + c.logo) }}"></td>
                <td>{{ c.name }}</td>
                <td>{{ c.votes }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
